services:
  agent-api:
    build:
      context: ../services/agent-api
    env_file:
      - ../.env
    environment:
      ENVIRONMENT: production
      WARO_CLI_BINARY: /usr/local/bin/waro
      REDIS_URL: redis://redis:6379/0
    ports:
      - "127.0.0.1:${AGENT_API_PORT:-8100}:8100"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - waro_ai_internal
      - postgresqlwarolabs_default

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - waro_ai_internal

  phoenix:
    image: arizephoenix/phoenix:latest
    profiles:
      - observability
    restart: unless-stopped
    ports:
      - "127.0.0.1:6006:6006"
      - "127.0.0.1:4317:4317"
    networks:
      - waro_ai_internal

volumes:
  redis-data:

networks:
  waro_ai_internal:
  postgresqlwarolabs_default:
    external: true
