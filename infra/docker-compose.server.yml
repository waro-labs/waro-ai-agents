services:
  agent-api:
    build:
      context: ../services/agent-api
    env_file:
      - ../.env
    environment:
      ENVIRONMENT: production
      WARO_CLI_BINARY: /usr/local/bin/waro
      REDIS_URL: redis://redis:6379/0
    ports:
      - "127.0.0.1:${AGENT_API_PORT:-8100}:8100"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - waro_ai_internal
      - waro_runtime
      - postgresqlwarolabs_default

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - waro_ai_internal

  phoenix:
    image: arizephoenix/phoenix:latest
    profiles:
      - observability
    restart: unless-stopped
    environment:
      PHOENIX_ENABLE_AUTH: ${PHOENIX_ENABLE_AUTH:-true}
      PHOENIX_SECRET: ${PHOENIX_SECRET:?PHOENIX_SECRET is required when Phoenix auth is enabled}
      PHOENIX_ADMIN_SECRET: ${PHOENIX_ADMIN_SECRET:-}
      PHOENIX_DEFAULT_ADMIN_INITIAL_PASSWORD: ${PHOENIX_DEFAULT_ADMIN_INITIAL_PASSWORD:-}
      PHOENIX_ENABLE_STRONG_PASSWORD_POLICY: ${PHOENIX_ENABLE_STRONG_PASSWORD_POLICY:-true}
      PHOENIX_USE_SECURE_COOKIES: ${PHOENIX_USE_SECURE_COOKIES:-true}
      PHOENIX_ROOT_URL: ${PHOENIX_ROOT_URL:-https://phoenix.warocol.com}
      PHOENIX_CSRF_TRUSTED_ORIGINS: ${PHOENIX_CSRF_TRUSTED_ORIGINS:-https://phoenix.warocol.com}
      PHOENIX_SQL_DATABASE_URL: ${PHOENIX_SQL_DATABASE_URL:?PHOENIX_SQL_DATABASE_URL is required}
      PHOENIX_ALLOW_EXTERNAL_RESOURCES: ${PHOENIX_ALLOW_EXTERNAL_RESOURCES:-false}
    ports:
      - "127.0.0.1:6006:6006"
      - "127.0.0.1:4317:4317"
    volumes:
      - phoenix-data:/data
    networks:
      - waro_ai_internal
      - waro_runtime
      - postgresqlwarolabs_default

volumes:
  redis-data:
  phoenix-data:

networks:
  waro_ai_internal:
    internal: true
  waro_runtime:
    name: ${WARO_RUNTIME_NETWORK:-waro-network}
    external: true
  postgresqlwarolabs_default:
    external: true
